name: Daily Forecast Refresh

on:
  schedule:
    - cron: '0 14 * * *'   # 07:00 MST (UTC-7) every morning
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests boto3

      - name: Fetch forecasts and build forecast.json
        run: python forecasts/scripts/daily_refresh.py --upload
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET:     ${{ secrets.R2_BUCKET }}

      - name: Commit forecast.json to repo (optional backup)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/forecast.json
          git diff --staged --quiet || git commit -m "chore: daily forecast update $(date -u +%Y-%m-%d)"
          git push
